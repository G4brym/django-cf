name: Release

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: bash scripts/version.sh
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version is already published
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.changesets.outputs.pullRequestNumber == ''
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          if pip index versions django-cf 2>/dev/null | grep -q "$VERSION"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Python package
        if: steps.check.outputs.published == 'false'
        run: |
          pip install build
          python3 -m build

      - name: Publish to PyPI
        if: steps.check.outputs.published == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            BODY=$(awk "/^## ${VERSION}\$/{ found=1; next } /^## /{ if(found) exit } found" CHANGELOG.md)
            if [ -z "$BODY" ]; then
              BODY="See [CHANGELOG.md](https://github.com/G4brym/django-cf/blob/main/CHANGELOG.md) for details."
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --latest
            echo "Created release $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
